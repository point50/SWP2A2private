<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
      <img src="assets/dogpaw.png" />
      <h1>Dog adoption</h1>
    </header>

        <form class="adoption-form">
        <h2>Please fill this from</h2>

        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="house">Select a your house type</label>
        <select id="house" name="house">
            <option value="terrarium">Terrarium House</option>
            <option value="detached">Detached House</option>
            <option value="townhouse">Town House</option>
            <option value="condo">Apartment/Condominium</option>
        </select>

        <div class = "inoutdoor">
         <input type="radio" name="option" id="btn1" required>
        <label for="btn1"> In door
        </label>
        
        <input type="radio" name="option" id="btn2">
        <label for="btn2"> Out door
        </label>

        </div>

        <label for="petamount">Amount of pets in your household</label>
        <input type="number" id="petamount" name="petamount" min="0" required>

        <label class="agreement">
        <input type="checkbox" name="agreement" required>
        I understand that submitting this form only shows my interest in adopting the dog.
        It does not guarantee that I will receive the dog.
        </label>
        <button type="submit">Adopt</button>
        <a href="index.html">
        <button type="button">Return</button>
        </a>
    </form>

    <footer class = "center">
        <p>Phon Pornprasertsuk | 6833207021</p>
    </footer>
</body>
</html>
